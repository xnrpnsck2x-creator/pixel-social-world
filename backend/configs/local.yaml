server:
  addr: ":8787"
  cors_allowed_origins:
    - "http://127.0.0.1:18888"
    - "http://localhost:18888"
    - "http://127.0.0.1:8787"
    - "http://localhost:8787"
  read_header_timeout_seconds: 5
  read_timeout_seconds: 15
  write_timeout_seconds: 20
  idle_timeout_seconds: 75
  shutdown_timeout_seconds: 10
auth:
  access_ttl_seconds: 900
  refresh_ttl_seconds: 2592000
  admin_token: "local-admin-token"
  provider_verification: "claimed"
  apple_client_ids: []
  google_client_ids: []
storage:
  mode: "memory"
  package_artifacts_dir: "var/creator_packages"
  package_install_dir: "var/creator_runtime"
realtime:
  mode: "memory"
  presence_ttl_seconds: 30
  session_ttl_seconds: 900
  main_city_room_capacity: 100
  housing_room_capacity: 20
  minigame_room_capacity: 16
  custom_room_capacity: 50
economy:
  starting_coin_balance: 25
  creator_share_bps: 1000
  daily_soft_cap: 400
retention:
  room_chat_history_days: 0
  private_message_days: 365
  mailbox_days: 365
  report_days: 730
  ledger_days: 2555
  creator_audit_days: 730
  creator_artifact_staging_days: 30
housing:
  items_config_path: "../configs/housing_items.json"
  sell_refund_rate: 0.5
minigames:
  fishing_config_path: "../configs/fishing.json"
utility:
  panels_config_path: "../configs/utility_panels.json"
ai_review:
  mode: "local_policy"
  base_url: "http://127.0.0.1:1234/v1"
  model: "qwen/qwen3-coder-next"
  timeout_seconds: 45
postgres:
  dsn: "postgres://pixel:pixel@127.0.0.1:5432/pixel_social_world?sslmode=disable"
  max_open_conns: 40
  max_idle_conns: 20
  conn_max_lifetime_seconds: 1800
  conn_max_idle_time_seconds: 300
redis:
  addr: "127.0.0.1:6379"
  pool_size: 128
  min_idle_conns: 16
  dial_timeout_seconds: 5
  read_timeout_seconds: 3
  write_timeout_seconds: 3
